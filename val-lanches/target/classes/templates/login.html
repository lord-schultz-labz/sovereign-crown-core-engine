<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Val Lanches - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #fcc82b 0%, #a84c42 100%);
        }

        .login-card {
            width: 360px;
            border-radius: 24px;
            color: #424242;
        }

        .login-logo {
            width: 250px;
            height: 250px;
            object-fit: contain;
        }

        .btn-login {
            background-color: #a84c42;
            border-color: #fcc82b;
            color: #fff;
        }

        .btn-login:hover {
            background-color: #fcc82b;
            border-color: #923f36;
            color: black;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center py-4">

<div class="card p-4 shadow login-card">

    <div class="text-center">
        <img src="/images/val-lanches.png" alt="Logo Val Lanches" class="login-logo mb-2">
    </div>

    <form method="post" action="/login">

        <input name="username" class="form-control mb-2" placeholder="Usuario">

        <input name="password" type="password" class="form-control mb-3" placeholder="Senha">

        <button class="btn btn-login w-100" type="submit">Entrar</button>

    </form>

</div>

</body>
</html>
