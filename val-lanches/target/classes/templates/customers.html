<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Val Lanches - Clientes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(145deg, #f0f2f5, #e6ebf0);
        }

        /* HEADER */
        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }

        .logo {
            width: 200px;
            filter: drop-shadow(0 10px 18px rgba(0,0,0,0.2));
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        /* CARD */
        .card {
            border-radius: 18px;
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        /* INPUTS */
        .form-control {
            background: #eef1f4;
            border: 1px solid #dde2e7;
            border-radius: 10px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05),
                        inset -2px -2px 5px rgba(255,255,255,0.7);
        }

        .form-control:focus {
            background: #eef1f4;
            box-shadow: 0 0 0 2px rgba(13,110,253,0.15);
        }

        /* BUTTON */
        .btn-container {
            text-align: center;
            margin: 20px 0;
        }

        .btn-add {
            padding: 10px 50px;
            border-radius: 12px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }

        /* TABLE */
        table {
            table-layout: fixed;
            width: 100%;
        }

        td:nth-child(3) {
            word-break: break-word;
        }

        tbody tr:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.08);
        }
    </style>
</head>

<body>

<div class="brand-header">
    <img src="/images/val-lanches.png" class="logo">
    <div class="page-title">Clientes</div>
</div>

<div class="container">

    <div class="card p-3">
        <div class="row g-3">
            <div class="col-md-3">
                <input id="name" class="form-control" placeholder="Nome">
            </div>

            <div class="col-md-3">
                <input id="phone" class="form-control" placeholder="Telefone">
            </div>

            <div class="col-md-3">
                <input id="email" class="form-control" placeholder="Email">
            </div>

            <div class="col-md-3">
                <input id="address" class="form-control" placeholder="Endereco">
            </div>
        </div>
    </div>

    <div class="btn-container">
        <button id="mainButton" class="btn btn-success btn-add" onclick="handleMainAction()">
            Adicionar
        </button>
    </div>

    <div class="card p-3">
        <div class="table-responsive">
            <table class="table table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Email</th>
                        <th>Endereco</th>
                        <th>Acoes</th>
                    </tr>
                </thead>
                <tbody id="customerTable"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
let selectedId = null

/* PHONE MASK (ONLY WHEN USER TYPES) */
const phoneInput = document.getElementById('phone')

phoneInput.addEventListener('input', e => {
    let raw = e.target.value.replace(/\D/g, '')

    if (!raw) {
        e.target.value = ''
        return
    }

    if (raw.startsWith('55')) raw = raw.slice(2)

    let formatted = '+55 '

    if (raw.length > 0) formatted += raw.substring(0,2)
    if (raw.length >= 3) formatted += ' ' + raw.substring(2,7)
    if (raw.length >= 8) formatted += '-' + raw.substring(7,11)

    e.target.value = formatted
})

setInterval(loadCustomers, 2000)

function loadCustomers() {
    fetch('/customers')
    .then(res => res.json())
    .then(data => {
        const table = document.getElementById('customerTable')
        table.innerHTML = ''

        data.forEach(c => {
            const row = document.createElement('tr')

            row.innerHTML = `
                <td>${c.name}</td>
                <td>${c.phone}</td>
                <td>${c.email}</td>
                <td>${c.address}</td>
                <td>
                    <button class="btn btn-warning btn-sm">Editar</button>
                    <button class="btn btn-danger btn-sm">Excluir</button>
                </td>
            `

            const [editBtn, deleteBtn] = row.querySelectorAll('button')

            editBtn.onclick = () => selectCustomer(c)
            deleteBtn.onclick = () => deleteCustomer(c.id)

            table.appendChild(row)
        })
    })
}

function handleMainAction() {
    selectedId ? updateCustomer() : addCustomer()
}

function addCustomer() {
    fetch('/customers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(getData())
    })
    clearForm()
}

function updateCustomer() {
    fetch(`/customers/${selectedId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(getData())
    })

    selectedId = null
    updateButton()
    clearForm()
}

function deleteCustomer(id) {
    fetch(`/customers/${id}`, { method: 'DELETE' })
}

function selectCustomer(c) {
    selectedId = c.id

    name.value = c.name
    phone.value = c.phone
    email.value = c.email
    address.value = c.address

    updateButton()
}

function updateButton() {
    const btn = document.getElementById('mainButton')

    if (selectedId) {
        btn.textContent = 'Salvar'
        btn.classList.replace('btn-success','btn-primary')
    } else {
        btn.textContent = 'Adicionar'
        btn.classList.replace('btn-primary','btn-success')
    }
}

function getData() {
    return {
        name: name.value,
        phone: phone.value,
        email: email.value,
        address: address.value
    }
}

function clearForm() {
    name.value = ''
    phone.value = ''
    email.value = ''
    address.value = ''
}

loadCustomers()
</script>

</body>
</html>
