<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Val Lanches - Clientes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
            padding-top: 160px; /* prevents overlap with fixed header */
        }

        /* 🔝 HEADER FIXO CENTRAL */
        .brand-header {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 245, 233, 0.95);
            border: 1px solid #ffd8a8;
            border-radius: 22px;
            padding: 18px 28px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(6px); /* ✨ modern look */
            z-index: 1000;
        }

        .brand-header img {
            width: 110px;
            height: 110px;
            object-fit: contain;
        }

        .card {
            border-radius: 18px;
        }

        .form-control {
            border-radius: 10px;
        }

        /* 🔽 SEPARATION FROM HEADER */
        .form-section {
            margin-top: 30px;
        }

        /* 🔥 BUTTON */
        .btn-add {
            padding: 12px 60px;
            font-size: 1.2rem;
            border-radius: 14px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
        }

        .btn-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
    </style>
</head>

<body>

<!-- 🔝 LOGO FIXO -->
<div class="brand-header">
    <img src="/images/val-lanches.png" alt="Logo Val Lanches">
</div>

<div class="container">

    <!-- 🧾 FORM -->
    <div class="form-section">
        <div class="card shadow-sm w-100">
            <div class="card-body">

                <h5 class="card-title text-center mb-4">
                    Adicionar ou Excluir Clientes
                </h5>

                <div class="row g-3">
                    <div class="col-md-3">
                        <input id="name" type="text" class="form-control" placeholder="Nome">
                    </div>

                    <div class="col-md-3">
                        <input id="phone" type="text" class="form-control" placeholder="Telefone">
                    </div>

                    <div class="col-md-3">
                        <input id="email" type="email" class="form-control" placeholder="Email">
                    </div>

                    <div class="col-md-3">
                        <input id="address" type="text" class="form-control" placeholder="Endereco">
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- 🔥 BOTÃO -->
    <div class="btn-container">
        <button class="btn btn-success btn-add" onclick="addCustomer()">
            Adicionar
        </button>
    </div>

    <!-- 📋 LISTA -->
    <div class="card shadow-sm mb-5">
        <div class="card-body">

            <h5 class="card-title">Lista de Clientes</h5>

            <table class="table table-striped table-hover mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Email</th>
                        <th>Endereco</th>
                        <th>Acoes</th>
                    </tr>
                </thead>

                <tbody id="customerTable"></tbody>
            </table>

        </div>
    </div>

</div>

<script>

let selectedId = null;

setInterval(loadCustomers, 2000);

function loadCustomers() {
    fetch('/customers')
        .then(res => res.json())
        .then(data => {

            let table = document.getElementById("customerTable");
            table.innerHTML = "";

            data.forEach(c => {
                table.innerHTML += `
                    <tr onclick="selectCustomer(${c.id}, '${c.name}', '${c.phone}', '${c.email}', '${c.address}')">
                        <td>${c.id}</td>
                        <td>${c.name}</td>
                        <td>${c.phone}</td>
                        <td>${c.email}</td>
                        <td>${c.address}</td>
                        <td>
                            <button class="btn btn-danger btn-sm" onclick="deleteCustomer(${c.id}); event.stopPropagation();">Excluir</button>
                        </td>
                    </tr>
                `;
            });

        });
}

function addCustomer() {

    let customer = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        address: document.getElementById("address").value
    };

    fetch('/customers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(customer)
    });
}

function deleteCustomer(id) {
    fetch(`/customers/${id}`, {
        method: 'DELETE'
    });
}

function selectCustomer(id, name, phone, email, address) {

    selectedId = id;

    document.getElementById("name").value = name;
    document.getElementById("phone").value = phone;
    document.getElementById("email").value = email;
    document.getElementById("address").value = address;
}

loadCustomers();

</script>

</body>
</html>
