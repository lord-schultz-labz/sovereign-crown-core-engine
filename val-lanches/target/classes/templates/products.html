<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Val Lanches - Produtos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(145deg, #f0f2f5, #e6ebf0);
        }

        /* HEADER */
        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }

        .logo {
            width: 200px;
            filter: drop-shadow(0 10px 18px rgba(0,0,0,0.2));
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        /* CARD */
        .card {
            border-radius: 18px;
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        /* INPUTS */
        .form-control {
            background: #eef1f4;
            border: 1px solid #dde2e7;
            border-radius: 10px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05),
                        inset -2px -2px 5px rgba(255,255,255,0.7);
        }

        .form-control:focus {
            background: #eef1f4;
            box-shadow: 0 0 0 2px rgba(13,110,253,0.15);
        }

        /* BUTTON */
        .btn-container {
            text-align: center;
            margin: 20px 0;
        }

        .btn-add {
            padding: 10px 50px;
            border-radius: 12px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }

        /* TABLE */
        table {
            table-layout: fixed;
            width: 100%;
        }

        td:nth-child(2) {
            word-break: break-word;
        }

        tbody tr:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.08);
        }
    </style>
</head>

<body>

<div class="brand-header">
    <img src="/images/val-lanches.png" class="logo">
    <div class="page-title">Produtos</div>
</div>

<div class="container">

    <!-- FORM -->
    <div class="card p-3">
        <div class="row g-3">
            <div class="col-md-3">
                <input id="price" type="number" step="0.01" class="form-control" placeholder="Preco">
            </div>

            <div class="col-md-3">
                <input id="description" class="form-control" placeholder="Descricao">
            </div>

            <div class="col-md-3">
                <input id="brand" class="form-control" placeholder="Marca">
            </div>

            <div class="col-md-3">
                <input id="supplier" class="form-control" placeholder="Fornecedor">
            </div>
        </div>
    </div>

    <!-- BUTTON -->
    <div class="btn-container">
        <button id="mainButton" class="btn btn-success btn-add" onclick="handleMainAction()">
            Adicionar
        </button>
    </div>

    <!-- TABLE -->
    <div class="card p-3">
        <div class="table-responsive">
            <table class="table table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>Preco</th>
                        <th>Descricao</th>
                        <th>Marca</th>
                        <th>Fornecedor</th>
                        <th>Acoes</th>
                    </tr>
                </thead>
                <tbody id="productTable"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
let selectedId = null

setInterval(loadProducts, 2000)

function loadProducts() {
    fetch('/products')
    .then(res => res.json())
    .then(data => {
        const table = document.getElementById('productTable')
        table.innerHTML = ''

        data.forEach(p => {
            const row = document.createElement('tr')

            row.innerHTML = `
                <td>R$ ${p.price}</td>
                <td>${p.description}</td>
                <td>${p.brand}</td>
                <td>${p.supplier}</td>
                <td>
                    <button class="btn btn-warning btn-sm">Editar</button>
                    <button class="btn btn-danger btn-sm">Excluir</button>
                </td>
            `

            const [editBtn, deleteBtn] = row.querySelectorAll('button')

            editBtn.onclick = () => selectProduct(p)
            deleteBtn.onclick = () => deleteProduct(p.id)

            table.appendChild(row)
        })
    })
}

function handleMainAction() {
    selectedId ? updateProduct() : addProduct()
}

function addProduct() {
    fetch('/products', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(getData())
    })
    clearForm()
}

function updateProduct() {
    fetch(`/products/${selectedId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(getData())
    })

    selectedId = null
    updateButton()
    clearForm()
}

function deleteProduct(id) {
    fetch(`/products/${id}`, { method: 'DELETE' })
}

function selectProduct(p) {
    selectedId = p.id

    price.value = p.price
    description.value = p.description
    brand.value = p.brand
    supplier.value = p.supplier

    updateButton()
}

function updateButton() {
    const btn = document.getElementById('mainButton')

    if (selectedId) {
        btn.textContent = 'Salvar'
        btn.classList.replace('btn-success','btn-primary')
    } else {
        btn.textContent = 'Adicionar'
        btn.classList.replace('btn-primary','btn-success')
    }
}

function getData() {
    return {
        price: price.value,
        description: description.value,
        brand: brand.value,
        supplier: supplier.value
    }
}

function clearForm() {
    price.value = ''
    description.value = ''
    brand.value = ''
    supplier.value = ''
}

loadProducts()
</script>

</body>
</html>
