<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Val Lanches - Produtos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Título -->
    <h2 class="mb-4">🍔 Gestão de Produtos</h2>

    <!-- Formulário -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">

            <h5 class="card-title">Adicionar / Atualizar Produto</h5>

            <div class="row g-3">

                <div class="col-md-3">
                    <input id="price" type="number" step="0.01" class="form-control" placeholder="Preço">
                </div>

                <div class="col-md-3">
                    <input id="description" type="text" class="form-control" placeholder="Descrição">
                </div>

                <div class="col-md-3">
                    <input id="brand" type="text" class="form-control" placeholder="Marca">
                </div>

                <div class="col-md-3">
                    <input id="supplier" type="text" class="form-control" placeholder="Fornecedor">
                </div>

            </div>

            <div class="mt-3">
                <button class="btn btn-success" onclick="addProduct()">Adicionar</button>
                <button class="btn btn-warning" onclick="updateProduct()">Atualizar</button>
            </div>

        </div>
    </div>

    <!-- Tabela -->
    <div class="card shadow-sm">
        <div class="card-body">

            <h5 class="card-title">Lista de Produtos</h5>

            <table class="table table-striped table-hover mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Preço</th>
                        <th>Descrição</th>
                        <th>Marca</th>
                        <th>Fornecedor</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="productTable">
                    <!-- preenchido via JS -->
                </tbody>
            </table>

        </div>
    </div>

</div>

<script>

let selectedId = null;

// 🔄 Auto refresh
setInterval(loadProducts, 2000);

// 📥 Carregar produtos
function loadProducts() {
    fetch('/products')
        .then(res => res.json())
        .then(data => {

            let table = document.getElementById("productTable");
            table.innerHTML = "";

            data.forEach(p => {
                table.innerHTML += `
                    <tr onclick="selectProduct(${p.id}, ${p.price}, '${p.description}', '${p.brand}', '${p.supplier}')">
                        <td>${p.id}</td>
                        <td>R$ ${p.price}</td>
                        <td>${p.description}</td>
                        <td>${p.brand}</td>
                        <td>${p.supplier}</td>
                        <td>
                            <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id}); event.stopPropagation();">Excluir</button>
                        </td>
                    </tr>
                `;
            });

        });
}

// ➕ Adicionar
function addProduct() {

    let product = {
        price: document.getElementById("price").value,
        description: document.getElementById("description").value,
        brand: document.getElementById("brand").value,
        supplier: document.getElementById("supplier").value
    };

    fetch('/products', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(product)
    });
}

// ✏️ Atualizar
function updateProduct() {

    if (!selectedId) return;

    let product = {
        id: selectedId,
        price: document.getElementById("price").value,
        description: document.getElementById("description").value,
        brand: document.getElementById("brand").value,
        supplier: document.getElementById("supplier").value
    };

    fetch(`/products/${selectedId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(product)
    });
}

// ❌ Deletar
function deleteProduct(id) {
    fetch(`/products/${id}`, {
        method: 'DELETE'
    });
}

// 🎯 Selecionar produto
function selectProduct(id, price, description, brand, supplier) {

    selectedId = id;

    document.getElementById("price").value = price;
    document.getElementById("description").value = description;
    document.getElementById("brand").value = brand;
    document.getElementById("supplier").value = supplier;
}

// 🚀 Carregar ao abrir
loadProducts();

</script>

</body>
</html>
