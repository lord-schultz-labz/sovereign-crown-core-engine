# ===============================
# CONFIGURAÇÃO DO BANCO (MySQL)
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/burger?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Driver do MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================

# Atualiza automaticamente as tabelas conforme suas entidades
spring.jpa.hibernate.ddl-auto=update

# Mostra SQL no console (ótimo pra aprender/debug)
spring.jpa.show-sql=true

# Formata o SQL no console
spring.jpa.properties.hibernate.format_sql=true

# Dialeto do MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# PORTA DO SERVIDOR
# ===============================

server.port=8080