<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Val Lanches - Pedidos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">🧾 Gestão de Pedidos</h2>

    <div class="row">

        <!-- 🛒 Carrinho -->
        <div class="col-md-6">

            <div class="card shadow-sm mb-4">
                <div class="card-body">

                    <h5>Adicionar Produto ao Pedido</h5>

                    <select id="productSelect" class="form-select mb-3"></select>

                    <button class="btn btn-primary" onclick="addItem()">Adicionar ao Carrinho</button>

                    <hr>

                    <h5>Itens do Pedido</h5>

                    <ul id="cartList" class="list-group mb-3"></ul>

                    <h5>Total: R$ <span id="total">0.00</span></h5>

                    <div class="mt-3">
                        <button class="btn btn-success" onclick="createOrder()">Criar Pedido</button>
                        <button class="btn btn-secondary" onclick="clearCart()">Limpar</button>
                    </div>

                </div>
            </div>

        </div>

        <!-- 📋 Lista de pedidos -->
        <div class="col-md-6">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h5>Pedidos</h5>

                    <table class="table table-striped mt-3">
                        <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Itens</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                        </thead>

                        <tbody id="orderTable"></tbody>

                    </table>

                </div>
            </div>

        </div>

    </div>

</div>

<script>

let cart = [];
let total = 0;

// 🔄 Auto refresh
setInterval(() => {
    loadProducts();
    loadOrders();
}, 2000);

// 📥 Carregar produtos no select
function loadProducts() {
    fetch('/products')
        .then(res => res.json())
        .then(data => {

            let select = document.getElementById("productSelect");
            select.innerHTML = "";

            data.forEach(p => {
                select.innerHTML += `
                    <option value="${p.id}">
                        ${p.description} - R$ ${p.price}
                    </option>
                `;
            });
        });
}

// ➕ Adicionar item ao carrinho
function addItem() {

    let select = document.getElementById("productSelect");
    let selectedText = select.options[select.selectedIndex].text;
    let price = parseFloat(selectedText.split("R$ ")[1]);

    let item = {
        description: selectedText.split(" - R$")[0],
        price: price,
        brand: "N/A"
    };

    cart.push(item);
    total += price;

    renderCart();
}

// 🖥️ Renderizar carrinho
function renderCart() {

    let list = document.getElementById("cartList");
    list.innerHTML = "";

    cart.forEach((item, index) => {
        list.innerHTML += `
            <li class="list-group-item d-flex justify-content-between">
                ${item.description} - R$ ${item.price}
                <button class="btn btn-sm btn-danger" onclick="removeItem(${index})">X</button>
            </li>
        `;
    });

    document.getElementById("total").innerText = total.toFixed(2);
}

// ❌ Remover item
function removeItem(index) {
    total -= cart[index].price;
    cart.splice(index, 1);
    renderCart();
}

// 🧹 Limpar carrinho
function clearCart() {
    cart = [];
    total = 0;
    renderCart();
}

// 🚀 Criar pedido
function createOrder() {

    let order = {
        items: cart,
        totalPrice: total,
        numberOfItems: cart.length,
        status: "IN_PROGRESS"
    };

    fetch('/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(order)
    });

    clearCart();
}

// 📥 Carregar pedidos
function loadOrders() {
    fetch('/orders')
        .then(res => res.json())
        .then(data => {

            let table = document.getElementById("orderTable");
            table.innerHTML = "";

            data.forEach(o => {

                table.innerHTML += `
                    <tr>
                        <td>${o.id}</td>
                        <td>${o.numberOfItems}</td>
                        <td>R$ ${o.totalPrice}</td>
                        <td>${o.status}</td>
                        <td>
                            <button class="btn btn-success btn-sm" onclick="updateStatus(${o.id}, 'FINISHED')">Finalizar</button>
                            <button class="btn btn-warning btn-sm" onclick="updateStatus(${o.id}, 'IN_PROGRESS')">Andamento</button>
                            <button class="btn btn-danger btn-sm" onclick="updateStatus(${o.id}, 'CANCELLED')">Cancelar</button>
                        </td>
                    </tr>
                `;
            });

        });
}

// 🔄 Atualizar status
function updateStatus(id, status) {

    fetch(`/orders/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: status })
    });
}

// 🚀 Inicial
loadProducts();
loadOrders();

</script>

</body>
</html>
