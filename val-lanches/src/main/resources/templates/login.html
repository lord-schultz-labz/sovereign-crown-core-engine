<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Val Lanches - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="card p-4 shadow" style="width:300px;">

    <h4 class="mb-3 text-center">Val Lanches</h4>

    <form method="post" action="/login">

        <input name="username" class="form-control mb-2" placeholder="Usuario">

        <input name="password" type="password" class="form-control mb-3" placeholder="Senha">

        <button class="btn btn-primary w-100" type="submit">Entrar</button>

    </form>

</div>

</body>
</html>
