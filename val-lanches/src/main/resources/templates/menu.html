<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Val Lanches - Menu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #fff8ef 0%, #ffe4be 100%);
        }

        .menu-logo {
            width: min(320px, 70vw);
            filter: drop-shadow(0 18px 30px rgba(180, 74, 0, 0.22));
        }

        .menu-card {
            max-width: 560px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(255, 166, 0, 0.2);
            border-radius: 28px;
            box-shadow: 0 24px 50px rgba(106, 52, 0, 0.12);
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center py-5">

<div class="container text-center">

    <div class="menu-card p-4 p-md-5">
        <img src="/images/val-lanches.png" alt="Logo Val Lanches" class="menu-logo mb-3">

        <p class="text-uppercase text-muted fw-semibold mb-4" style="letter-spacing: 0.18em;">Menu principal</p>

        <div class="d-grid gap-3 col-12 col-md-8 mx-auto">
            <a href="/dashboard" class="btn btn-dark btn-lg">Dashboard</a>
            <a href="/customers-page" class="btn btn-primary btn-lg">Clientes</a>
            <a href="/products-page" class="btn btn-success btn-lg">Produtos</a>
            <a href="/orders-page" class="btn btn-warning btn-lg">Pedidos</a>
        </div>
    </div>

</div>

</body>
</html>
