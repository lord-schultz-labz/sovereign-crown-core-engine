<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Val Lanches - Produtos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(180deg, #fcc82b 0%, #a84c42 100%);
        }

        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }

        .logo {
            width: 200px;
            filter: drop-shadow(0 10px 18px rgba(0,0,0,0.2));
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 10px 0 15px;
        }

        .card {
            border-radius: 18px;
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .form-control {
            background: #eef1f4;
            border-radius: 10px;
            border: 1px solid #dde2e7;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05),
                        inset -2px -2px 5px rgba(255,255,255,0.7);
        }

        .btn-container {
            text-align: center;
            margin: 20px 0;
        }

        .btn-add {
            padding: 10px 50px;
            border-radius: 12px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }

        table {
            width: 100%;
            table-layout: fixed;
        }

        tbody tr:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.08);
        }
    </style>
</head>

<body>

<div class="brand-header">
    <img src="/images/val-lanches.png" class="logo">
    <div class="page-title">Produtos</div>
</div>

<div class="container">

    <!-- FORM -->
    <div class="card p-3">
        <div class="row g-3">
            <div class="col-md-4">
                <input id="nome" class="form-control" placeholder="Nome">
            </div>

            <div class="col-md-4">
                <input id="preco" type="text" class="form-control" placeholder="Preco">
            </div>

            <div class="col-md-4">
                <input id="fornecedor" class="form-control" placeholder="Fornecedor">
            </div>
        </div>
    </div>

    <!-- BUTTON -->
    <div class="btn-container">
        <button id="mainButton" class="btn btn-success btn-add" onclick="handleMainAction()">
            Adicionar
        </button>
    </div>

    <!-- TABLE -->
    <div class="card p-3">
        <div class="table-responsive">
            <table class="table table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>Nome</th>
                        <th>Preco</th>
                        <th>Fornecedor</th>
                        <th>Acoes</th>
                    </tr>
                </thead>
                <tbody id="productTable"></tbody>
            </table>
        </div>
    </div>

</div>

<script>

const precoInput = document.getElementById('preco')

precoInput.addEventListener('focus', () => {
    if (!precoInput.value) {
        precoInput.value = 'R$ '
    }
})

precoInput.addEventListener('blur', () => {
    if (precoInput.value === 'R$ ' || precoInput.value.trim() === '') {
        precoInput.value = ''
    }
})

precoInput.addEventListener('input', e => {
    let value = e.target.value.replace(/\D/g, '')

    if (!value) {
        e.target.value = 'R$ '
        return
    }

    value = (parseInt(value) / 100).toFixed(2) + ''

    value = value.replace('.', ',')

    value = value.replace(/\B(?=(\d{3})+(?!\d))/g, '.')

    e.target.value = 'R$ ' + value
})

let selectedId = null

setInterval(loadProducts, 2000)

function loadProducts() {
    fetch('/products')
    .then(res => res.json())
    .then(data => {
        const table = document.getElementById('productTable')
        table.innerHTML = ''

        data.forEach(p => {
            const row = document.createElement('tr')

            row.innerHTML = `
                <td>${p.nome}</td>
                <td>${formatCurrency(p.preco)}</td>
                <td>${p.fornecedor}</td>
                <td>
                    <button class="btn btn-warning btn-sm">Editar</button>
                    <button class="btn btn-danger btn-sm">Excluir</button>
                </td>
            `

            const [editBtn, deleteBtn] = row.querySelectorAll('button')

            editBtn.onclick = () => selectProduct(p)
            deleteBtn.onclick = () => deleteProduct(p.id)

            table.appendChild(row)
        })
    })
}

function handleMainAction() {
    selectedId ? updateProduct() : addProduct()
}

function addProduct() {
    fetch('/products', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(getData())
    })
    clearForm()
}

function updateProduct() {
    fetch(`/products/${selectedId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(getData())
    })

    selectedId = null
    updateButton()
    clearForm()
}

function deleteProduct(id) {
    fetch(`/products/${id}`, { method: 'DELETE' })
}

function selectProduct(p) {
    selectedId = p.id

    nome.value = p.nome
    preco.value = p.preco
    fornecedor.value = p.fornecedor

    updateButton()
}

function updateButton() {
    const btn = document.getElementById('mainButton')

    if (selectedId) {
        btn.textContent = 'Salvar'
        btn.classList.replace('btn-success','btn-primary')
    } else {
        btn.textContent = 'Adicionar'
        btn.classList.replace('btn-primary','btn-success')
    }
}

function getData() {
    return {
        nome: nome.value,
        preco: parseCurrency(preco.value),
        fornecedor: fornecedor.value
    }
}

function parseCurrency(value) {
    if (!value) return 0

    return parseFloat(
        value
            .replace('R$', '')
            .replace(/\./g, '')
            .replace(',', '.')
            .trim()
    )
}

function clearForm() {
    nome.value = ''
    preco.value = ''
    fornecedor.value = ''
}

function formatCurrency(value) {
    if (value == null) return ''

    return new Intl.NumberFormat('pt-BR', {
        style: 'currency',
        currency: 'BRL'
    }).format(value)
}

loadProducts()
</script>

</body>
</html>
