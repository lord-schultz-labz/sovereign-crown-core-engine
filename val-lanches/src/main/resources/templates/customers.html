<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Val Lanches - Clientes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .brand-header {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #fff5e9;
            border: 1px solid #ffd8a8;
            border-radius: 20px;
            padding: 14px 18px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }

        .brand-header img {
            width: 72px;
            height: 72px;
            object-fit: contain;
        }
    </style>
</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="brand-header mb-4">
        <img src="/images/val-lanches.png" alt="Logo Val Lanches">
        <div>
            <h1 class="h3 mb-1">Val Lanches</h1>
            <p class="text-muted mb-0">Gestao de clientes</p>
        </div>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-body">

            <h5 class="card-title">Adicionar / Atualizar Cliente</h5>

            <div class="row g-3">
                <div class="col-md-3">
                    <input id="name" type="text" class="form-control" placeholder="Nome">
                </div>

                <div class="col-md-3">
                    <input id="phone" type="text" class="form-control" placeholder="Telefone">
                </div>

                <div class="col-md-3">
                    <input id="email" type="email" class="form-control" placeholder="Email">
                </div>

                <div class="col-md-3">
                    <input id="address" type="text" class="form-control" placeholder="Endereco">
                </div>
            </div>

            <div class="mt-3">
                <button class="btn btn-success" onclick="addCustomer()">Adicionar</button>
                <button class="btn btn-warning" onclick="updateCustomer()">Atualizar</button>
            </div>

        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <h5 class="card-title">Lista de Clientes</h5>

            <table class="table table-striped table-hover mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Email</th>
                        <th>Endereco</th>
                        <th>Acoes</th>
                    </tr>
                </thead>

                <tbody id="customerTable"></tbody>
            </table>

        </div>
    </div>

</div>

<script>

let selectedId = null;

setInterval(loadCustomers, 2000);

function loadCustomers() {
    fetch('/customers')
        .then(res => res.json())
        .then(data => {

            let table = document.getElementById("customerTable");
            table.innerHTML = "";

            data.forEach(c => {
                table.innerHTML += `
                    <tr onclick="selectCustomer(${c.id}, '${c.name}', '${c.phone}', '${c.email}', '${c.address}')">
                        <td>${c.id}</td>
                        <td>${c.name}</td>
                        <td>${c.phone}</td>
                        <td>${c.email}</td>
                        <td>${c.address}</td>
                        <td>
                            <button class="btn btn-danger btn-sm" onclick="deleteCustomer(${c.id}); event.stopPropagation();">Excluir</button>
                        </td>
                    </tr>
                `;
            });

        });
}

function addCustomer() {

    let customer = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        address: document.getElementById("address").value
    };

    fetch('/customers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(customer)
    });
}

function updateCustomer() {

    if (!selectedId) return;

    let customer = {
        id: selectedId,
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        address: document.getElementById("address").value
    };

    fetch(`/customers/${selectedId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(customer)
    });
}

function deleteCustomer(id) {
    fetch(`/customers/${id}`, {
        method: 'DELETE'
    });
}

function selectCustomer(id, name, phone, email, address) {

    selectedId = id;

    document.getElementById("name").value = name;
    document.getElementById("phone").value = phone;
    document.getElementById("email").value = email;
    document.getElementById("address").value = address;
}

loadCustomers();

</script>

</body>
</html>
