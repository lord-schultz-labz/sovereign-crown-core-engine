<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Val Lanches - Clientes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
        }

        /* 🔝 HEADER (LOGO ONLY) */
        .brand-header {
            position: sticky;
            top: 0;
            z-index: 1000;

            display: flex;
            justify-content: center;
            padding: 12px 0;
            margin-bottom: 25px;

            background: #f8f9fa;
        }

        .logo {
            width: 250px;
            height: 250px;
            object-fit: contain;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.15));
        }

        /* 📦 FORM CARD */
        .card {
            border-radius: 18px;
        }

        .form-control {
            border-radius: 10px;
        }

        /* 🔘 BUTTON */
        .btn-add {
            padding: 10px 50px;
            font-size: 1.1rem;
            border-radius: 12px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.12);
        }

        .btn-container {
            display: flex;
            justify-content: center;
            margin: 18px 0;
        }

        /* 📋 TABLE */
        .table-card {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<!-- 🔝 HEADER -->
<div class="brand-header">
    <img src="/images/val-lanches.png" alt="Logo Val Lanches" class="logo">
</div>

<h1>Clientes</h1>

<div class="container">

    <!-- 🧾 FORM -->
    <div class="card shadow-sm">
        <div class="card-body">

            <div class="row g-3">
                <div class="col-md-3">
                    <input id="name" type="text" class="form-control" placeholder="Nome">
                </div>

                <div class="col-md-3">
                    <input id="phone" type="text" class="form-control" placeholder="Telefone">
                </div>

                <div class="col-md-3">
                    <input id="email" type="email" class="form-control" placeholder="Email">
                </div>

                <div class="col-md-3">
                    <input id="address" type="text" class="form-control" placeholder="Endereco">
                </div>
            </div>

        </div>
    </div>

    <!-- 🔥 BUTTON -->
    <div class="btn-container">
        <button class="btn btn-success btn-add" onclick="addCustomer()">
            Adicionar
        </button>
    </div>

    <!-- 📋 LIST -->
    <div class="card shadow-sm table-card">
        <div class="card-body">


            <table class="table table-striped table-hover mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Email</th>
                        <th>Endereco</th>
                        <th>Acoes</th>
                    </tr>
                </thead>

                <tbody id="customerTable"></tbody>
            </table>

        </div>
    </div>

</div>

<script>
let selectedId = null

setInterval(loadCustomers, 2000)

function loadCustomers() {
    fetch('/customers')
        .then(res => res.json())
        .then(data => {
            const table = document.getElementById('customerTable')
            table.innerHTML = ''

            data.forEach(c => {
                const row = document.createElement('tr')

                row.innerHTML = `
                    <td>${c.id}</td>
                    <td>${c.name}</td>
                    <td>${c.phone}</td>
                    <td>${c.email}</td>
                    <td>${c.address}</td>
                    <td>
                        <button class="btn btn-danger btn-sm">
                            Excluir
                        </button>
                    </td>
                `

                row.onclick = () => selectCustomer(c)

                row.querySelector('button').onclick = e => {
                    e.stopPropagation()
                    deleteCustomer(c.id)
                }

                table.appendChild(row)
            })
        })
}

function addCustomer() {
    const customer = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        address: document.getElementById('address').value
    }

    fetch('/customers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(customer)
    })
}

function deleteCustomer(id) {
    fetch(`/customers/${id}`, {
        method: 'DELETE'
    })
}

function selectCustomer(c) {
    selectedId = c.id

    document.getElementById('name').value = c.name
    document.getElementById('phone').value = c.phone
    document.getElementById('email').value = c.email
    document.getElementById('address').value = c.address
}

loadCustomers()
</script>

</body>
</html>
