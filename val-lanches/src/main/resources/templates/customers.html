<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Val Lanches - Clientes</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Título -->
    <h2 class="mb-4">👥 Gestão de Clientes</h2>

    <!-- Formulário -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">

            <h5 class="card-title">Adicionar / Atualizar Cliente</h5>

            <div class="row g-3">
                <div class="col-md-3">
                    <input id="name" type="text" class="form-control" placeholder="Nome">
                </div>

                <div class="col-md-3">
                    <input id="phone" type="text" class="form-control" placeholder="Telefone">
                </div>

                <div class="col-md-3">
                    <input id="email" type="email" class="form-control" placeholder="Email">
                </div>

                <div class="col-md-3">
                    <input id="address" type="text" class="form-control" placeholder="Endereço">
                </div>
            </div>

            <div class="mt-3">
                <button class="btn btn-success" onclick="addCustomer()">Adicionar</button>
                <button class="btn btn-warning" onclick="updateCustomer()">Atualizar</button>
            </div>

        </div>
    </div>

    <!-- Tabela -->
    <div class="card shadow-sm">
        <div class="card-body">

            <h5 class="card-title">Lista de Clientes</h5>

            <table class="table table-striped table-hover mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Email</th>
                        <th>Endereço</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="customerTable">
                    <!-- preenchido via JS -->
                </tbody>
            </table>

        </div>
    </div>

</div>

<script>

let selectedId = null;

// 🔄 Auto refresh
setInterval(loadCustomers, 2000);

// 📥 Carregar clientes
function loadCustomers() {
    fetch('/customers')
        .then(res => res.json())
        .then(data => {

            let table = document.getElementById("customerTable");
            table.innerHTML = "";

            data.forEach(c => {
                table.innerHTML += `
                    <tr onclick="selectCustomer(${c.id}, '${c.name}', '${c.phone}', '${c.email}', '${c.address}')">
                        <td>${c.id}</td>
                        <td>${c.name}</td>
                        <td>${c.phone}</td>
                        <td>${c.email}</td>
                        <td>${c.address}</td>
                        <td>
                            <button class="btn btn-danger btn-sm" onclick="deleteCustomer(${c.id}); event.stopPropagation();">Excluir</button>
                        </td>
                    </tr>
                `;
            });

        });
}

// ➕ Adicionar
function addCustomer() {

    let customer = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        address: document.getElementById("address").value
    };

    fetch('/customers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(customer)
    });
}

// ✏️ Atualizar
function updateCustomer() {

    if (!selectedId) return;

    let customer = {
        id: selectedId,
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        address: document.getElementById("address").value
    };

    fetch(`/customers/${selectedId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(customer)
    });
}

// ❌ Deletar
function deleteCustomer(id) {
    fetch(`/customers/${id}`, {
        method: 'DELETE'
    });
}

// 🎯 Selecionar cliente (clicando na tabela)
function selectCustomer(id, name, phone, email, address) {

    selectedId = id;

    document.getElementById("name").value = name;
    document.getElementById("phone").value = phone;
    document.getElementById("email").value = email;
    document.getElementById("address").value = address;
}

// 🚀 Carregar ao abrir
loadCustomers();

</script>

</body>
</html>
